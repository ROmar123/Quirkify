<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="South Africa's home for verified collectibles, limited drops, and pre-loved finds. Every item is AI-checked before it hits the shelf." />
    <meta name="keywords" content="collectibles, auctions, resale, South Africa, verified, AI-checked" />
    <meta name="author" content="Quirkify" />

    <!-- Security headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.firebaseio.com https://*.googleapis.com https://*.yoco.com; frame-src 'self' https://*.yoco.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <title>Quirkify | Gamified Social Commerce</title>
    <meta name="theme-color" content="#A855F7" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://mvoigokzsaybwiogjpvr.supabase.co" />
    <link rel="dns-prefetch" href="https://mvoigokzsaybwiogjpvr.supabase.co" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #FAFAFA; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 8px); }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      #boot-fallback {
        display: none;
        min-height: 100vh;
        padding: 40px 24px;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: linear-gradient(180deg, #faf5ff 0%, #ffffff 100%);
      }
      #boot-fallback.visible { display: flex; }
      #boot-fallback .card {
        max-width: 420px;
        background: white;
        border: 1px solid #ede9fe;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(88, 28, 135, 0.08);
      }
      #boot-fallback h1 { margin: 0 0 10px; font-size: 24px; color: #111827; }
      #boot-fallback p { margin: 0 0 18px; color: #6b7280; line-height: 1.5; }
      #boot-fallback button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: linear-gradient(135deg, #a855f7, #ec4899);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      #root:empty::before {
        content: ''; display: block; width: 36px; height: 36px;
        border: 2.5px solid #e9d5ff; border-top-color: #a855f7;
        border-radius: 50%; animation: spin 0.8s linear infinite;
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      }
      @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
    <script>
      (function () {
        const FLAG = 'quirkify_boot_recovery_v2';
        if (!('serviceWorker' in navigator) || sessionStorage.getItem(FLAG) === 'done') return;

        sessionStorage.setItem(FLAG, 'running');

        window.addEventListener('load', function () {
          Promise.resolve()
            .then(() => navigator.serviceWorker.getRegistrations())
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
            .then(() => ('caches' in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : Promise.resolve()))
            .then(() => {
              try { localStorage.removeItem('quirkify-cart'); } catch (_) {}
              try { sessionStorage.setItem(FLAG, 'done'); } catch (_) {}
              window.location.replace(window.location.pathname + window.location.search + window.location.hash);
            })
            .catch(() => {
              try { sessionStorage.setItem(FLAG, 'done'); } catch (_) {}
            });
        }, { once: true });

        window.setTimeout(function () {
          if (!document.getElementById('root')?.children.length) {
            document.getElementById('boot-fallback')?.classList.add('visible');
          }
        }, 4000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-fallback">
      <div class="card">
        <h1>Refreshing Quirkify</h1>
        <p>We are clearing old browser state so the latest store loads cleanly.</p>
        <button onclick="window.location.reload()">Reload now</button>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: sans-serif;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use Quirkify.</p>
      </div>
    </noscript>
  </body>
</html>
