<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="South Africa's home for verified collectibles, limited drops, and pre-loved finds. Every item is AI-checked before it hits the shelf." />
    <meta name="keywords" content="collectibles, auctions, resale, South Africa, verified, AI-checked" />
    <meta name="author" content="Quirkify" />

    <!-- Security headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.firebaseio.com https://*.googleapis.com https://*.yoco.com; frame-src 'self' https://*.yoco.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- PWA -->
    <title>Quirkify | Gamified Social Commerce</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Quirkify" />
    <meta name="theme-color" content="#A855F7" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://mvoigokzsaybwiogjpvr.supabase.co" />
    <link rel="dns-prefetch" href="https://mvoigokzsaybwiogjpvr.supabase.co" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #FAFAFA; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom, 8px); }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      #root:empty::before {
        content: ''; display: block; width: 36px; height: 36px;
        border: 2.5px solid #e9d5ff; border-top-color: #a855f7;
        border-radius: 50%; animation: spin 0.8s linear infinite;
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      }
      @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: sans-serif;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use Quirkify.</p>
      </div>
    </noscript>
  </body>
</html>
