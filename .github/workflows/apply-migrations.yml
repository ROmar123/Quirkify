name: Apply Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - claude/quirkify-production-ready-xMVne

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Test Supabase HTTPS connectivity
        run: |
          echo "=== Supabase REST API health check ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: sb_publishable_PzK-Rd37B8yJaF8c9Wz9og_uJ6Q_CLS" \
            "https://mvoigokzsaybwiogjpvr.supabase.co/rest/v1/products?select=id&limit=1")
          echo "REST API HTTP status: $STATUS"

      - name: Apply migrations via Node.js pg client
        run: |
          npm install pg 2>/dev/null
          node - <<'SCRIPT'
          const { Client } = require('pg');
          const fs = require('fs');

          const CONFIGS = [
            {
              label: 'Pooler session mode (5432)',
              connectionString: 'postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:5432/postgres',
              ssl: { rejectUnauthorized: false },
            },
            {
              label: 'Direct DB host (5432)',
              connectionString: 'postgresql://postgres:j7nVcs3PJmRI0oH8@db.mvoigokzsaybwiogjpvr.supabase.co:5432/postgres',
              ssl: { rejectUnauthorized: false },
            },
            {
              label: 'Pooler transaction mode (6543)',
              connectionString: 'postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:6543/postgres',
              ssl: { rejectUnauthorized: false },
            },
          ];

          const MIGRATIONS = [
            { name: '007_fix_rls.sql',   path: 'supabase/migrations/007_fix_rls.sql' },
            { name: '008_campaigns.sql', path: 'supabase/migrations/008_campaigns.sql' },
          ];

          async function tryApply(config) {
            const client = new Client({
              connectionString: config.connectionString,
              ssl: config.ssl,
              connectionTimeoutMillis: 15000,
              statement_timeout: 30000,
            });
            await client.connect();
            console.log('Connected via:', config.label);

            for (const m of MIGRATIONS) {
              const sql = fs.readFileSync(m.path, 'utf8');
              try {
                await client.query(sql);
                console.log('Applied:', m.name);
              } catch (e) {
                if (/already exists|duplicate/.test(e.message)) {
                  console.log('Already applied:', m.name);
                } else {
                  console.error('Failed:', m.name, '-', e.message);
                }
              }
            }

            const { rows } = await client.query(
              "SELECT tablename, policyname FROM pg_policies WHERE tablename IN ('products','campaigns') ORDER BY 1,2"
            );
            console.log('\nActive RLS policies:');
            rows.forEach(r => console.log(' ', r.tablename, '/', r.policyname));

            await client.end();
          }

          (async () => {
            for (const config of CONFIGS) {
              try {
                await tryApply(config);
                console.log('\nMigrations complete!');
                process.exit(0);
              } catch (e) {
                console.log(config.label, 'failed:', e.message);
              }
            }
            console.error('\nAll connections failed.');
            console.error('If IP restrictions are on, add GitHub Actions IPs in Supabase > Settings > Database > Network Restrictions.');
            process.exit(1);
          })();
          SCRIPT
