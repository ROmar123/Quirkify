name: Apply Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - claude/quirkify-production-ready-xMVne

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="mvoigokzsaybwiogjpvr"
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          apply_migration() {
            local name="$1"
            local file="$2"
            local sql
            sql=$(cat "$file")

            echo "=== Applying: $name ==="
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "$API" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n --arg q "$sql" '{"query":$q}')")

            echo "HTTP status: $HTTP_STATUS"
            cat /tmp/response.json
            echo ""

            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
              echo "✓ $name applied"
            else
              echo "✗ $name failed — check response above"
              return 1
            fi
          }

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret not set — skipping migrations."
            echo "Add it in GitHub repo Settings → Secrets → Actions."
            exit 0
          fi

          apply_migration "007_fix_rls.sql"   "supabase/migrations/007_fix_rls.sql"
          apply_migration "008_campaigns.sql" "supabase/migrations/008_campaigns.sql"

          echo ""
          echo "Verifying active RLS policies..."
          VERIFY_SQL="SELECT tablename, policyname FROM pg_policies WHERE tablename IN ('products','campaigns') ORDER BY 1,2;"
          curl -s -X POST "$API" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "$(jq -n --arg q "$VERIFY_SQL" '{"query":$q}')" | jq .

          echo ""
          echo "Migrations complete!"
