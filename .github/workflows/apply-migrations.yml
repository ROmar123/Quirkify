name: Apply Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - claude/quirkify-production-ready-xMVne

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Debug connection (pooler session mode)
        continue-on-error: true
        env:
          PGPASSWORD: j7nVcs3PJmRI0oH8
        run: |
          echo "=== DNS for pooler ==="
          host aws-0-eu-central-1.pooler.supabase.com || true
          echo "=== Testing pooler port 5432 (session mode) ==="
          PGCONNECT_TIMEOUT=10 psql \
            "postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -c "SELECT 'pooler-5432 OK';" 2>&1 || echo "pooler-5432 FAILED"
          echo "=== Testing pooler port 6543 (transaction mode) ==="
          PGCONNECT_TIMEOUT=10 psql \
            "postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require" \
            -c "SELECT 'pooler-6543 OK';" 2>&1 || echo "pooler-6543 FAILED"
          echo "=== Testing direct DB host ==="
          PGCONNECT_TIMEOUT=10 psql \
            "postgresql://postgres:j7nVcs3PJmRI0oH8@db.mvoigokzsaybwiogjpvr.supabase.co:5432/postgres" \
            -c "SELECT 'direct OK';" 2>&1 || echo "direct FAILED"

      - name: Apply 007 - Fix products RLS
        continue-on-error: true
        env:
          PGPASSWORD: j7nVcs3PJmRI0oH8
        run: |
          psql "postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f supabase/migrations/007_fix_rls.sql 2>&1
          echo "Exit code: $?"

      - name: Apply 008 - Create campaigns table
        continue-on-error: true
        env:
          PGPASSWORD: j7nVcs3PJmRI0oH8
        run: |
          psql "postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -f supabase/migrations/008_campaigns.sql 2>&1
          echo "Exit code: $?"

      - name: Verify result
        continue-on-error: true
        env:
          PGPASSWORD: j7nVcs3PJmRI0oH8
        run: |
          psql "postgresql://postgres.mvoigokzsaybwiogjpvr:j7nVcs3PJmRI0oH8@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require" \
            -c "SELECT policyname FROM pg_policies WHERE tablename IN ('products','campaigns') ORDER BY 1;" \
            -c "SELECT COUNT(*) as campaign_rows FROM campaigns;" 2>&1
