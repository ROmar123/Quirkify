name: Apply Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - claude/quirkify-production-ready-xMVne

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: j7nVcs3PJmRI0oH8
      PGHOST: aws-0-eu-central-1.pooler.supabase.com
      PGPORT: 5432
      PGUSER: postgres.mvoigokzsaybwiogjpvr
      PGSSLMODE: require
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install psql and tools
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Test connection
        run: |
          echo "Resolving host..."
          dig +short $PGHOST || true
          echo "Attempting psql connection (verbose)..."
          PGCONNECT_TIMEOUT=15 psql -v ON_ERROR_STOP=1 \
            "postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE}" \
            -c "SELECT current_database(), current_user, version();"

      - name: Apply 007 - Fix products RLS
        run: |
          psql "postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE}" \
            -f supabase/migrations/007_fix_rls.sql 2>&1 || echo "007 may already be applied"

      - name: Apply 008 - Create campaigns table
        run: |
          psql "postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE}" \
            -f supabase/migrations/008_campaigns.sql 2>&1

      - name: Verify migrations
        run: |
          CONN="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${PGSSLMODE}"
          psql "$CONN" -c "SELECT COUNT(*) as campaigns FROM public.campaigns;"
          psql "$CONN" -c "SELECT policyname FROM pg_policies WHERE tablename IN ('products','campaigns') ORDER BY tablename, policyname;"
